name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Setup build tools (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          gcc --version || xcode-select --install

      - name: Setup build tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build KLang (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          make clean || true
          make
          ./klang --version || echo "Built successfully"

      - name: Build KLang (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          make clean || true
          make
          ./klang.exe --version || echo "Built successfully"

      - name: Run tests (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          make test

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          make test

      - name: Upload binary (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: klang-${{ matrix.os }}
          path: klang
          retention-days: 7

      - name: Upload binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: klang-${{ matrix.os }}
          path: klang.exe
          retention-days: 7
